<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My CI/CD Project</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:80%;
    max-width:700px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

h1{
    font-size:42px;
    margin-bottom:15px;
    color:#00ffd5;
}

h2{
    font-size:28px;
    margin-bottom:20px;
}

p{
    font-size:18px;
    margin:10px 0;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#00ffd5;
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    background:white;
    transform:scale(1.05);
}

.footer{
    margin-top:25px;
    font-size:14px;
    color:#ddd;
}
</style>

</head>
<body>

<div class="container">
    <h1>CI/CD Pipeline Project (Practical - 8 )</h1>
    <h2>Hosted on AWS S3 </h2>

    <p>This website is deployed using:</p>
    <p>✅ GitHub Repository</p>
    <p>✅ AWS CodePipeline</p>
    <p>✅ Amazon S3 Bucket Hosting</p>

    <p>Whenever code is pushed to GitHub,<br>
    this website updates automatically.</p>

    <a href="#" class="btn">Deployment Successful</a>

    <div class="footer">
        Created by Sakshi Bhingarkar (202301040260)
    </div>
</div>

</body>
</html>
